    <line x1="256" y1="256" x2="138" y2="256"/>
    <line x1="256" y1="256" x2="374" y2="256"/>
    <line x1="256" y1="256" x2="172" y2="172"/>
    <line x1="256" y1="256" x2="340" y2="172"/>
    <line x1="256" y1="256" x2="172" y2="340"/>
    <line x1="256" y1="256" x2="340" y2="340"/>
  </g>
  <!-- 外围节点 -->
  <g fill="#ffffff">
    <circle cx="256" cy="138" r="27"/>
    <circle cx="256" cy="374" r="27"/>
